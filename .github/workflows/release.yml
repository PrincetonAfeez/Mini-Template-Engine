name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]" -c constraints-dev.txt

      - name: Ruff lint
        run: ruff check template_engine tests

      - name: Ruff format check
        run: ruff format --check template_engine tests

      - name: Mypy
        run: mypy template_engine

      - name: Run tests
        run: coverage run -m pytest -q && coverage report --fail-under=95

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
